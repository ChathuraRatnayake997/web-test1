<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curriculum Vitae</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #f4f4f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem;
    min-height: 100vh;
  }
  .header {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 850px;
    margin-bottom: 1rem;
    gap: 0.75rem;
  }
  h2 {
    font-size: clamp(1.2rem, 4vw, 1.75rem);
    color: #1b1c1a;
    font-weight: 600;
  }
  .btn {
    border: 1px solid #182312;
    color: #182312;
    padding: 0.5rem 1.25rem;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn:hover { background: #182312; color: #fff; }
  #viewer {
    width: 100%;
    max-width: 850px;
    height: 80vh;
    overflow-y: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    background: #e4e4e7;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    padding: 10px 0;
  }
  #viewer::-webkit-scrollbar { display: none; }
  .page-wrapper {
    margin: 15px auto;
    max-width: 95%;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    background: #fff;
    line-height: 0;
  }
  .pdf-page {
    display: block;
    width: 100% !important;
    height: auto !important;
  }
  #loading {
    text-align: center;
    font-size: 1.125rem;
    color: #666;
    margin-top: 3rem;
    padding: 2rem;
  }
  .back { margin-top: 1.25rem; }
  .back a { color: #666; font-size: 0.875rem; text-decoration: none; }
  .back a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    body { padding: 0.75rem; }
    .header { flex-direction: column; align-items: flex-start; }
    #viewer { height: 75vh; border-radius: 4px; }
    .page-wrapper { margin: 10px auto; max-width: 98%; }
  }
</style>
</head>
<body>
<div class="header">
  <h2>Curriculum Vitae</h2>
  <a class="btn" id="downloadBtn" href="#" download>Download PDF</a>
</div>
<div id="viewer">
  <div id="loading">Loading Document...</div>
</div>
<div class="back"><a href="../index.html">&larr; Back to site</a></div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const pdfUrl = params.get('url') || '/assets/cv.pdf';
  const filename = pdfUrl.split('/').pop().split('?')[0] || 'CV.pdf';

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

  const viewer = document.getElementById('viewer');
  const loading = document.getElementById('loading');
  const downloadBtn = document.getElementById('downloadBtn');
  downloadBtn.href = pdfUrl;
  downloadBtn.download = filename;

  pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
    loading.style.display = 'none';
    for (let i = 1; i <= pdf.numPages; i++) {
      renderPage(pdf, i);
    }
  }).catch(function(err) {
    console.error('PDF error:', err);
    loading.textContent = 'Failed to load PDF. Use the download button above.';
  });

  function renderPage(pdf, pageNum) {
    pdf.getPage(pageNum).then(function(page) {
      const scale = 1.5;
      const viewport = page.getViewport({ scale });

      const wrapper = document.createElement('div');
      wrapper.className = 'page-wrapper';

      const canvas = document.createElement('canvas');
      canvas.className = 'pdf-page';
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      wrapper.appendChild(canvas);
      viewer.appendChild(wrapper);

      page.render({ canvasContext: canvas.getContext('2d'), viewport });
    });
  }
})();
</script>
</body>
</html>
