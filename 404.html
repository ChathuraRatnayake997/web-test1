<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>404 — Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #fbf9f5;
    --text: #1b1c1a;
    --muted: #444;
    --primary: #182312;
    --primary-hover: #fff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #131412;
      --text: #e4e2de;
      --muted: #999;
      --primary: #a3a3a3;
      --primary-hover: #1a1a1a;
    }
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }
  h1 { font-size: 6rem; font-weight: 700; line-height: 1; color: var(--primary); }
  p { font-size: 1.25rem; color: var(--muted); margin: 1rem 0 2rem; max-width: 28rem; }
  a {
    display: inline-block;
    border: 1px solid var(--primary);
    color: var(--primary);
    padding: 0.75rem 2rem;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.2s;
  }
  a:hover { background: var(--primary); color: var(--primary-hover); }
  .footer {
    position: fixed;
    bottom: 1.5rem;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0.5;
  }
  @media (max-width: 600px) {
    h1 { font-size: 4rem; }
    p { font-size: 1rem; }
  }
</style>
</head>
<body>
<h1>404</h1>
<p>The page you're looking for doesn't exist or has been moved.</p>
<a href="index.html">Back to Home</a>
<div class="footer">Designed by Academic Visuals Initiative (AVI)</div>
</body>
</html>
